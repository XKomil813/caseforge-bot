<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaseForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#050506] text-white flex items-center justify-center p-4 font-rubik">
    <div class="w-full max-w-md border border-[#1f222a] rounded-3xl bg-gradient-to-br from-[#0a0d14] to-[#121623] shadow-[0_20px_40px_rgba(0,0,0,0.45)] overflow-hidden">
      <div class="px-6 pb-6 pt-5 bg-[#10131f] border-b border-[#1d2332] flex items-center justify-between">
        <h1 class="text-4xl font-bold text-[#f5f7fa] font-space-grotesk">CaseForge</h1>
        <button id="fullscreenBtn" class="rounded-lg bg-[#2f3342] px-3 py-1 text-sm font-semibold text-[#f7f8fb] hover:bg-[#41475f] transition">To‘liq ekran</button>
      </div>

      <div class="p-6">
        <div class="rounded-2xl border border-[#1f222a] bg-[#0f121d] p-4 mb-4">
          <div class="text-xs text-[#a8b0c3]">Live case</div>
          <div class="text-sm font-semibold text-[#e5e9f2]">kim nima tushirdi</div>
        </div>

        <div class="rounded-2xl border border-[#1f222a] bg-[#0f121d] p-4 mb-4 flex items-center justify-between gap-3">
          <div>
            <div class="text-xs text-[#a8b0c3]">Balans</div>
            <div id="balance" class="text-lg font-bold text-[#f1f6ff]">0</div>
          </div>
          <button id="topUpBtn" class="rounded-xl bg-[#2f3342] px-4 py-2 text-sm font-bold text-[#f7f8fb] hover:bg-[#41475f] transition">To'ldirish</button>
        </div>

        <button id="openBtn" class="w-full rounded-2xl bg-[#2f3342] py-3 text-lg font-black text-[#f7f8fb] hover:bg-[#41475f] transition">Case ochish</button>

        <div id="status" class="mt-4 rounded-xl border border-[#1f222a] bg-[#0f121d] p-3 text-sm text-[#b8c2d7]">Holat: kutmoqda...</div>
        <div id="message" class="mt-3 hidden rounded-xl border border-[#1f222a] bg-[#0f121d] p-3 text-sm text-[#d9e2f0]"></div>

        <p class="mt-4 text-xs text-[#7c8db7]">Vazifalar: keyin qo‘shiladi</p>
      </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0d14] border-t border-[#1d2332] p-2">
      <div class="mx-auto flex max-w-md justify-between">
        <button class="flex flex-col items-center text-sm font-semibold text-[#9fb0d8] hover:text-[#f7f8fb]">
          <span class="material-icons-outlined mb-1 text-lg">home</span>
          Bosh sahifa
        </button>
        <button class="flex flex-col items-center text-sm font-semibold text-[#9fb0d8] hover:text-[#f7f8fb]">
          <span class="material-icons-outlined mb-1 text-lg">sports_esports</span>
          <span class="flex items-center gap-1">Oʻyinlar <span class="material-icons-outlined text-base">keyboard</span></span>
        </button>
        <button class="flex flex-col items-center text-sm font-semibold text-[#9fb0d8] hover:text-[#f7f8fb]">
          <span class="material-icons-outlined mb-1 text-lg">inventory_2</span>
          Inventar
        </button>
        <button class="flex flex-col items-center text-sm font-semibold text-[#9fb0d8] hover:text-[#f7f8fb]">
          <span class="material-icons-outlined mb-1 text-lg">person</span>
          Profil
        </button>
      </div>
    </nav>

    <script src="main.js"></script>
  </body>
</html>
