<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaseForge - CS2 Skins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Rajdhani', sans-serif; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .neon-border { border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(255, 122, 0, 0.1); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(255, 122, 0, 0.4); }
    </style>
</head>
<body class="min-h-screen bg-[#08090d] text-gray-200 p-0 m-0 overflow-x-hidden">

    <header class="w-full pt-8 pb-6 px-6 text-center">
        <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-500 via-yellow-400 to-red-600 font-gaming uppercase italic">
            CaseForge
        </h1>
        <p class="text-[10px] text-gray-500 tracking-[0.3em] uppercase mt-1">CS2 Skin Simulator</p>
    </header>

    <main class="max-w-md mx-auto px-5 pb-24">
        
        <div class="glass neon-border rounded-xl p-3 mb-6 flex items-center gap-3 overflow-hidden">
            <div class="relative">
                <div class="absolute inset-0 bg-orange-500 animate-pulse blur-md opacity-20 rounded-full"></div>
                <span class="material-icons-outlined text-orange-500 text-sm relative">history</span>
            </div>
            <div class="flex-1">
                <p class="text-[10px] text-gray-500 uppercase font-bold leading-none">Live Case</p>
                <p class="text-sm text-gray-300 font-medium truncate">User77: <span class="text-purple-400">AWP | Fade</span> tushirdi!</p>
            </div>
        </div>

        <div class="bg-gradient-to-r from-[#141721] to-[#1c2130] border border-white/5 rounded-2xl p-5 mb-6 flex items-center justify-between shadow-xl">
            <div>
                <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Sizning Balansingiz</p>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-3xl font-bold text-white font-gaming" id="balance">0.00</span>
                    <span class="text-orange-500 font-bold">$</span>
                </div>
            </div>
            <button id="topUpBtn" class="bg-white text-black px-5 py-2.5 rounded-xl font-bold text-sm uppercase transition transform active:scale-95 hover:bg-orange-500 hover:text-white">
                To'ldirish
            </button>
        </div>

        <div class="relative group mb-8">
            <div class="absolute -inset-1 bg-gradient-to-b from-orange-500/20 to-transparent blur-2xl opacity-50"></div>
            <div class="relative glass border border-white/10 rounded-3xl p-8 flex flex-col items-center">
                <div class="w-48 h-48 mb-6 flex items-center justify-center relative">
                    <img src="https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYuh6eZJz9H7o-ikZSOlP_wIK7U2D4B68cp2u_E9N2i2Vax_0VvazjyI9XAcVNrNA7U-Fm9yOq-hp_u6Z_AmGwj2HL8GvE4Xw" alt="Case" class="w-full object-contain drop-shadow-[0_0_30px_rgba(255,165,0,0.3)]" />
                </div>
                
                <button id="openBtn" class="btn-glow w-full bg-gradient-to-r from-orange-600 to-orange-400 py-4 rounded-2xl text-xl font-black text-white uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-orange-900/20">
                    Case Ochish
                </button>
            </div>
        </div>

        <div class="space-y-3">
            <div id="status" class="bg-[#12141c]/80 border border-white/5 p-4 rounded-xl text-center">
                <p class="text-xs text-gray-500 uppercase tracking-tighter mb-1">Tizim holati</p>
                <p class="text-sm text-blue-400 font-medium">Tayyor...</p>
            </div>
            <p class="text-center text-[10px] text-gray-600 uppercase tracking-widest">Yaqinda: Yangi kolleksiyalar qo'shiladi</p>
        </div>

    </main>

          <div id="home-section" class="section p-4">
          <div class="bg-gray-800/40 p-6 rounded-2xl border border-gray-700 backdrop-blur-md shadow-xl">
              <h2 class="text-xl font-bold mb-4 flex items-center font-['Orbitron'] tracking-wider">
                  <span class="material-icons-outlined mr-2 text-blue-400">analytics</span> STATISTIKA
              </h2>
              <div class="grid grid-cols-2 gap-4">
                  <div class="bg-gray-900/60 p-4 rounded-xl border border-gray-700">
                      <p class="text-gray-400 text-[10px] uppercase tracking-[2px] font-['Rajdhani'] font-bold">Ochiq keyslar</p>
                      <p class="text-2xl font-bold font-['Orbitron'] mt-1" id="total-opened">0</p>
                  </div>
                  <div class="bg-gray-900/60 p-4 rounded-xl border border-gray-700">
                      <p class="text-gray-400 text-[10px] uppercase tracking-[2px] font-['Rajdhani'] font-bold">Yutuqlar</p>
                      <p class="text-2xl font-bold text-yellow-500 font-['Orbitron'] mt-1 " id="total-wins">0</p>
                  </div>
              </div>
          </div>
      </div>

    <div id="keys-section" class="section hidden p-4">
        <div class="bg-gray-800/40 p-8 rounded-3xl border border-gray-700 text-center backdrop-blur-lg shadow-2xl">
            <div class="mb-8 relative">
                <div class="w-44 h-44 mx-auto bg-gradient-to-b from-blue-500/10 to-indigo-600/5 rounded-full flex items-center justify-center border border-blue-500/20">
                    <span class="material-icons-outlined text-7xl text-blue-400">inventory_2</span>
                </div>
            </div>
            
            <div id="status" class="h-10 mb-6 text-gray-400 font-['Rajdhani'] text-lg font-medium tracking-wide">
                Keys ochishga tayyor...
            </div>
            
            <button id="openBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 rounded-xl font-['Orbitron'] font-bold text-lg tracking-[3px] shadow-[0_0_20px_rgba(37,99,235,0.3)] transform active:scale-95 transition-all flex items-center justify-center">
                <span class="material-icons-outlined mr-2">lock_open</span> KEYSNI OCHISH
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900/90 border-t border-gray-800 px-4 py-3 flex justify-between items-center z-50 backdrop-blur-xl">
        <button onclick="showSection('home')" class="flex flex-col items-center text-blue-500">
            <span class="material-icons-outlined">home</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-['Rajdhani'] tracking-widest">Asosiy</span>
        </button>
        <button onclick="showSection('keys')" class="flex flex-col items-center text-gray-400 hover:text-white transition-all">
            <span class="material-icons-outlined">category</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-['Rajdhani'] tracking-widest">Keyslar</span>
        </button>
        <button onclick="showSection('games')" class="flex flex-col items-center text-gray-400">
            <span class="material-icons-outlined">sports_esports</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-['Rajdhani'] tracking-widest">O'yinlar</span>
        </button>
        <button onclick="showSection('inventory')" class="flex flex-col items-center text-gray-400">
            <span class="material-icons-outlined">shopping_bag</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-['Rajdhani'] tracking-widest">Sklad</span>
        </button>
        <button onclick="showSection('profile')" class="flex flex-col items-center text-gray-400">
            <span class="material-icons-outlined">account_circle</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-['Rajdhani'] tracking-widest">Profil</span>
        </button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
