<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaseForge - CS2 Skins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Rajdhani', sans-serif; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="min-h-screen bg-[#08090d] text-gray-200 p-0 m-0 overflow-x-hidden pb-24">

    <header class="w-full pt-8 pb-4 px-6 text-center">
        <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-yellow-400 font-gaming uppercase italic">
            CaseForge
        </h1>
        <p class="text-[9px] text-gray-500 tracking-[0.4em] uppercase mt-1">CS2 Skin Simulator</p>
    </header>

    <main class="max-w-md mx-auto px-5">
        
        <div id="home-section" class="section">
            <div class="glass border border-white/10 p-8 rounded-3xl shadow-2xl text-center">
                
                <div class="flex flex-col items-center justify-center space-y-6">
                    <div class="flex flex-col items-center">
                        <span class="text-gray-500 font-bold uppercase tracking-[3px] text-[10px] mb-1">Sizning Balansingiz</span>
                        <div class="flex items-center bg-gray-900/60 px-8 py-4 rounded-2xl border border-yellow-600/20 shadow-inner">
                            <span id="balance-display" class="text-4xl font-bold font-gaming text-yellow-500 mr-2">0</span>
                            <span class="material-icons-outlined text-yellow-500 text-3xl">monetization_on</span>
                        </div>
                    </div>

                    <button id="topUpBtn" class="flex items-center space-x-2 bg-gradient-to-r from-yellow-600 to-yellow-700 hover:from-yellow-500 hover:to-yellow-600 px-10 py-3.5 rounded-xl font-gaming font-bold text-xs tracking-widest shadow-lg active:scale-95 transition-all">
                        <span class="material-icons-outlined text-sm">add_circle</span>
                        <span>TO'LDIRISH</span>
                    </button>
                </div>

                <div class="mt-12 border-t border-white/5 pt-8 text-gray-500">
                    <p class="font-gaming text-sm tracking-widest text-white/80 uppercase">Xush kelibsiz!</p>
                    <p class="text-sm mt-2">Omadingizni sinab ko'rish uchun "Keyslar" bo'limiga o'ting.</p>
                </div>
            </div>
        </div>

        <div id="keys-section" class="section hidden">
            <div class="glass border border-white/10 p-8 rounded-3xl text-center">
                <div class="relative group mb-8">
                    <div class="absolute inset-0 bg-blue-500/10 blur-3xl rounded-full"></div>
                    <div class="relative w-48 h-48 mx-auto flex items-center justify-center">
                        <img src="https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsUFJ5KBFZv668FFYuh6eZJz9H7o-ikZSOlP_wIK7U2D4B68cp2u_E9N2i2Vax_0VvazjyI9XAcVNrNA7U-Fm9yOq-hp_u6Z_AmGwj2HL8GvE4Xw" alt="Case" class="w-full object-contain drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]" />
                    </div>
                </div>
                
                <div id="status" class="h-10 mb-6 flex items-center justify-center">
                    </div> 
                
                <button id="openBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl font-gaming font-bold text-lg tracking-[2px] flex items-center justify-center space-x-2 shadow-xl shadow-blue-900/20 active:scale-95 transition-all">
                    <span>KEYSNI OCHISH</span>
                    <span class="flex items-center text-yellow-400 text-sm">
                        (10 <span class="material-icons-outlined text-[16px] ml-1">monetization_on</span>)
                    </span>
                </button>
            </div>
        </div>

        <div id="games-section" class="section hidden text-center p-10 text-gray-500">O'yinlar bo'limi yaqinda...</div>
        <div id="inventory-section" class="section hidden text-center p-10 text-gray-500">Sklad bo'limi yaqinda...</div>
        <div id="profile-section" class="section hidden text-center p-10 text-gray-500">Profil bo'limi yaqinda...</div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0d0f17]/95 border-t border-white/5 px-4 py-3 flex justify-between items-center z-50 backdrop-blur-xl">
        <button onclick="showSection('home')" class="nav-btn flex flex-col items-center text-orange-500">
            <span class="material-icons-outlined">home</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-gaming tracking-widest">Asosiy</span>
        </button>
        <button onclick="showSection('keys')" class="nav-btn flex flex-col items-center text-gray-500">
            <span class="material-icons-outlined">category</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-gaming tracking-widest">Keyslar</span>
        </button>
        <button onclick="showSection('games')" class="nav-btn flex flex-col items-center text-gray-500">
            <span class="material-icons-outlined">sports_esports</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-gaming tracking-widest">O'yinlar</span>
        </button>
        <button onclick="showSection('inventory')" class="nav-btn flex flex-col items-center text-gray-500">
            <span class="material-icons-outlined">shopping_bag</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-gaming tracking-widest">Sklad</span>
        </button>
        <button onclick="showSection('profile')" class="nav-btn flex flex-col items-center text-gray-500">
            <span class="material-icons-outlined">account_circle</span>
            <span class="text-[9px] font-bold mt-1 uppercase font-gaming tracking-widest">Profil</span>
        </button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
