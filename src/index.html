<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaseForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#1e0f00] text-white flex items-center justify-center p-4">
    <div class="w-full max-w-md border border-[#6a3400] rounded-3xl bg-gradient-to-br from-[#281100] to-[#431d06] shadow-[0_20px_40px_rgba(0,0,0,0.45)] overflow-hidden">
      <div class="px-6 pb-6 pt-5 bg-[#3c1806] border-b border-[#6d2f00]">
        <h1 class="text-4xl font-black text-[#ff9b1f]">CaseForge</h1>
      </div>

      <div class="p-6">
        <div class="rounded-2xl border border-[#6a3400] bg-[#371b07] p-4 mb-4">
          <div class="text-xs text-[#ffbf7d]">Live case</div>
          <div class="text-sm font-semibold text-[#ffe5c4]">kim nima tushirdi</div>
        </div>

        <div class="rounded-2xl border border-[#6a3400] bg-[#331a0a] p-4 mb-4 flex items-center justify-between gap-3">
          <div>
            <div class="text-xs text-[#ffbf7d]">Balans</div>
            <div id="balance" class="text-lg font-bold text-[#fff]">0</div>
          </div>
          <button id="topUpBtn" class="rounded-xl bg-gradient-to-r from-[#ff8a00] via-[#ffa000] to-[#ffca4d] px-4 py-2 text-sm font-bold text-[#050505] hover:brightness-110 transition">To'ldirish</button>
        </div>

        <button id="openBtn" class="w-full rounded-2xl bg-gradient-to-r from-[#ff8a00] via-[#ffa000] to-[#ffca4d] py-3 text-lg font-black text-[#050505] hover:scale-[1.01] transition">Case ochish</button>

        <div id="status" class="mt-4 rounded-xl border border-[#6a3400] bg-[#331a0a] p-3 text-sm text-[#ffd8a0]">Holat: kutmoqda...</div>
        <div id="message" class="mt-3 hidden rounded-xl border border-[#6a3400] bg-[#331a0a] p-3 text-sm text-[#ffe9bb]"></div>

        <p class="mt-4 text-xs text-[#7c8db7]">Vazifalar: keyin qo‘shiladi</p>
      </div>

      <div class="px-6 py-4 border-t border-[#18244b] text-[13px] text-center text-[#7d8eb4]">@CaseForgeUZbot</div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
